<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
   
    <link rel="icon" href="/scissors.svg" />
    <link href="https://fonts.googleapis.com/css2?family=Catamaran:wght@400;700&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="./src/styles/index.css" />

    <title>Hair Day</title>

  </head>
  <body>
    <div id="app">
      <img src="/logo.svg" alt="Logo" class="logo" />

      <form class="form">
        <header>
          <h1>Agende um atendimento</h1>
          <p>
            Selecione data, horário e informe o nome do cliente para criar o
            agendamento
          </p>
        </header>

        <label for="date" class="label">Data</label>
        <div class="input">
          <i><img src="/calendar.svg" alt="Calendário" /></i>
          <input type="date" id="date" name="date" required />
        </div>

        <span class="label">Horários</span>
        <ul id="hours" class="hours" aria-label="Horários disponíveis de manhã">
      </form>
    </ul>

    <label for="client" class="label">Cliente</label>
    <div class="input">
      <i><img src="/person.svg" alt="Calendário" /></i>
      <input
        type="text"
        id="client"
        name="client"
        placeholder="Nome do cliente"
        required
      />
    </div>

    <button type="submit" class="button">Agendar</button>
  </form>

  <aside class="schedule">
    <header>
      <h1>Agendamentos</h1>
      <p>Visualize os agendamentos de acordo com o dia selecionado</p>
    </header>

    <section class="schedule-period">
      <header>
        <img src="/morning.svg" alt="Manhã" />
        <strong>Manhã</strong>
        <span>09h-12h</span>
      </header>
      <ul id="period-morning" class="period">
      </ul>
    </section>

    <section class="schedule-period">
      <header>
        <img src="/afternoon.svg" alt="Tarde" />
        <strong>Tarde</strong>
        <span>13h-18h</span>
      </header>
      <ul id="period-afternoon" class="period">
      </ul>
    </section>

    <section class="schedule-period">
      <header>
        <img src="/night.svg" alt="noite" />
        <strong>Noite</strong>
        <span>19h-21h</span>
      </header>
      <ul id="period-night" class="period">
      </ul>
    </section>
  </aside>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
